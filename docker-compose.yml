version: '3.8'
services:
  flask-app:
    build: .
    ports:
      - "3000:5000"
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=flaskdb
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flaskdb
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

volumes:
  mysql-data:
